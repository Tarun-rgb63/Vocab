function renderIdioms() {
  const q = (document.getElementById('idsrc').value || '').toLowerCase();
  const filtered = q
    ? IDIOMS.filter(i => i.phrase.toLowerCase().includes(q) || i.meaning.toLowerCase().includes(q))
    : IDIOMS;
  document.getElementById('idcount').textContent = `${filtered.length} of ${IDIOMS.length} idioms`;
  document.getElementById('idioms-list').innerHTML = filtered.length
    ? filtered.map(i => `
      <div class="icard">
        <div class="inum">#${i.n}</div>
        <h3>${esc(i.phrase)}</h3>
        <div class="imean">${esc(i.meaning)}</div>
        <div class="iex">"${esc(i.example)}"</div>
      </div>`).join('')
    : '<div class="empty">No idioms match your search.</div>';
}

renderIdioms();
